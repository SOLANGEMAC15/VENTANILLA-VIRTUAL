<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Muni Virtual</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="estilos-calendario.css">
</head>
<body>

    <aside class="sidebar">
        <h2>RESERVAS <br><span id="area-titulo" style="color:var(--muni-yellow)">MUNI VIRTUAL</span></h2>
        
        <div class="sidebar-form-content">
            <div class="form-group">
                <label>Nombres</label>
                <input type="text" id="nombres" placeholder="Nombres completos">
            </div>

            <div class="form-group">
                <label>Apellidos</label>
                <input type="text" id="apellidos" placeholder="Apellidos completos">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>DNI</label>
                    <input type="text" id="dni" maxlength="8" placeholder="DNI">
                </div>
                <div class="form-group">
                    <label>Celular</label>
                    <input type="text" id="celular" maxlength="9" placeholder="Celular">
                </div>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label>Ubicación (Casa o Local)</label>
                <input type="text" id="ubicacion" placeholder="Dirección exacta">
            </div>

            <div class="form-group">
                <label>Tipo de Solicitud</label>
                <select id="tipo-solicitud">
                    <option value="Alquiler">Alquiler</option>
                    <option value="Concesión">Concesión</option>
                </select>
            </div>

            <div class="form-group">
                <label>Actividad / Motivo</label>
                <input type="text" id="actividad" placeholder="Ej. Evento Deportivo">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Fecha del Servicio</label>
                    <input type="date" id="fecha-reserva">
                </div>
                <div class="form-group">
                    <label>Hora Inicio</label>
                    <select id="hora-inicio"></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Duración (Horas)</label>
                <input type="number" id="duracion" min="1" max="15" placeholder="Ej. 3">
            </div>


            <div class="form-group">
                <label>
                    <input type="checkbox" id="todo-dia"> Día Completo
                </label>
            </div>
        </div>
        
        <button id="btn-reservar">Registrar Ahora</button>
    </aside>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <script src="funciones-calendario.js"></script>
</body>
</html>
